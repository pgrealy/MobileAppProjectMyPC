<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Movie Details - {{movieDetails.original_title}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list>
    <ion-item *ngFor = "let detail of movieAttrs">{{detail}}</ion-item>
    <ion-button (click)="homePage()">Home</ion-button>
  </ion-list>
</ion-content>
