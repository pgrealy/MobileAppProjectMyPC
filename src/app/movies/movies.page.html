/* Coding taken and adapted from examples from class lectures */

<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Movies</ion-title>
  </ion-toolbar>
</ion-header>


/*  a list of movies based on user's keyword are displayed
    When movie image is clicked with mouse, application routes to movie details 
*/

<ion-content [fullscreen]="true">
  <ion-card (click)="openMovieDetails(movie)" *ngFor="let movie of movieInfo">
    <img src = "https://image.tmdb.org/t/p/w500/{{movie.poster_path}}">
    <ion-card-header>
      <ion-card-title>{{movie.title}}</ion-card-title>
    </ion-card-header>
   </ion-card>
</ion-content>
